<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>M1 SMS BOMBER-v1.0</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #000000;
            --surface-color: #111111;
            --border-color: #333333;
            --primary-accent: #ffffff;
            --secondary-accent: #888888;
            --danger-color: #ff0000;
            --success-color: #00ff00;
            --text-color: #ffffff;
            --text-muted: #aaaaaa;
            --font-mono: 'Fira Code', monospace;
            --glow-primary: rgba(255, 255, 255, 0.3);
            --glow-secondary: rgba(136, 136, 136, 0.2);
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Poppins', sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            background-image: 
                /* Gojo Satoru image background */
                url('https://images.unsplash.com/photo-1613336026275-d6d473084e85?auto=format&fit=crop&w=1920'),
                /* Grid pattern background */
                linear-gradient(0deg, transparent 24%, rgba(255, 255, 255, 0.05) 25%, rgba(255, 255, 255, 0.05) 26%, transparent 27%, transparent 74%, rgba(255, 255, 255, 0.05) 75%, rgba(255, 255, 255, 0.05) 76%, transparent 77%, transparent),
                linear-gradient(90deg, transparent 24%, rgba(255, 255, 255, 0.05) 25%, rgba(255, 255, 255, 0.05) 26%, transparent 27%, transparent 74%, rgba(255, 255, 255, 0.05) 75%, rgba(255, 255, 255, 0.05) 76%, transparent 77%, transparent);
            background-size: cover, 50px 50px, 50px 50px;
            background-position: center;
            background-blend-mode: overlay;
            background-repeat: no-repeat;
            animation: gridMove 20s linear infinite;
            position: relative;
        }
        
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85); /* Dark overlay for better readability */
            z-index: -1;
        }
        
        @keyframes gridMove {
            0% { background-position: center, 0 0, 0 0; }
            100% { background-position: center, 50px 50px, 50px 50px; }
        }
        
        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
        }
        
        @keyframes glow {
            0%, 100% { box-shadow: 0 0 10px var(--glow-primary); }
            50% { box-shadow: 0 0 20px var(--glow-primary), 0 0 30px var(--glow-secondary); }
        }
        
        @keyframes slideIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        @keyframes borderFlow {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        
        @keyframes shimmer {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(100%); }
        }
        
        .hidden {
            display: none !important;
        }
        
        .spinner {
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-top: 2px solid var(--primary-accent);
            border-radius: 50%;
            width: 25px;
            height: 25px;
            animation: spin 0.8s linear infinite;
            margin: 0 auto;
        }
        
        .site-header {
            text-align: center;
            margin-bottom: 40px;
            animation: slideIn 0.8s ease-out;
            position: relative;
            padding: 20px;
            border-bottom: 1px solid var(--border-color);
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(10px);
            width: 100%;
            max-width: 850px;
        }
        
        .site-header h1 {
            font-family: var(--font-mono);
            font-size: 2.5rem;
            font-weight: 600;
            color: var(--primary-accent);
            margin-bottom: 10px;
            letter-spacing: 3px;
            text-transform: uppercase;
            position: relative;
            animation: float 6s ease-in-out infinite;
        }
        
        .site-header h1::after {
            content: '';
            position: absolute;
            bottom: -10px;
            left: 50%;
            transform: translateX(-50%);
            width: 100px;
            height: 2px;
            background: var(--primary-accent);
            animation: pulse 2s infinite;
        }
        
        .site-header p {
            font-family: var(--font-mono);
            color: var(--text-muted);
            font-size: 1rem;
            animation: pulse 3s infinite;
            letter-spacing: 2px;
        }
        
        .control-panel-container {
            background-color: rgba(17, 17, 17, 0.9);
            border-radius: 0;
            box-shadow: 0 0 30px rgba(255, 255, 255, 0.1);
            padding: 40px;
            max-width: 850px;
            width: 100%;
            border: 2px solid var(--border-color);
            position: relative;
            overflow: hidden;
            animation: slideIn 1s ease-out;
            backdrop-filter: blur(10px);
        }
        
        .control-panel-container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--primary-accent), transparent);
            animation: borderFlow 3s linear infinite;
        }
        
        .form-controls {
            display: grid;
            grid-template-columns: 1fr;
            gap: 30px;
            margin-bottom: 30px;
        }
        
        .form-group {
            position: relative;
            animation: slideIn 0.6s ease-out both;
        }
        
        .form-group:nth-child(1) { animation-delay: 0.4s; }
        .form-group:nth-child(2) { animation-delay: 0.6s; }
        
        .form-group label {
            display: block;
            font-family: var(--font-mono);
            font-weight: 500;
            margin-bottom: 12px;
            color: var(--text-muted);
            font-size: 0.95rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            border-left: 2px solid var(--primary-accent);
            padding-left: 10px;
        }
        
        .form-group input[type="tel"],
        .form-group input[type="number"] {
            width: 100%;
            padding: 14px 14px 14px 40px;
            border: 1px solid var(--border-color);
            border-radius: 0;
            font-family: 'Poppins', sans-serif;
            font-size: 1rem;
            background: rgba(0, 0, 0, 0.7);
            color: var(--text-color);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            letter-spacing: 1px;
            backdrop-filter: blur(5px);
        }
        
        .form-group::before {
            content: '>';
            position: absolute;
            left: 18px;
            top: 47px;
            font-family: var(--font-mono);
            color: var(--primary-accent);
            font-weight: bold;
            animation: pulse 1.5s infinite;
        }
        
        .form-group input:focus {
            outline: none;
            border-color: var(--primary-accent);
            box-shadow: 0 0 0 2px rgba(255, 255, 255, 0.1);
            background: rgba(255, 255, 255, 0.05);
        }
        
        .intensity-control {
            display: flex;
            border-radius: 0;
            overflow: hidden;
            border: 1px solid var(--border-color);
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(5px);
        }
        
        .intensity-control input[type="radio"] {
            display: none;
        }
        
        .intensity-control label {
            flex: 1;
            padding: 14px;
            text-align: center;
            cursor: pointer;
            font-family: var(--font-mono);
            background: transparent;
            color: var(--text-muted);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
            border-right: 1px solid var(--border-color);
        }
        
        .intensity-control label:last-child {
            border-right: none;
        }
        
        .intensity-control label:hover {
            background: rgba(255, 255, 255, 0.05);
            color: var(--text-color);
        }
        
        .intensity-control input[type="radio"]:checked + label {
            background: rgba(255, 255, 255, 0.1);
            color: var(--primary-accent);
            font-weight: 700;
            border-bottom: 2px solid var(--primary-accent);
        }
        
        #trigger-btn {
            border: 1px solid var(--primary-accent);
            padding: 18px 30px;
            border-radius: 0;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            width: 100%;
            text-transform: uppercase;
            letter-spacing: 3px;
            margin-top: 20px;
            background: transparent;
            color: var(--primary-accent);
            position: relative;
            overflow: hidden;
            animation: slideIn 0.8s ease-out 0.8s both;
            backdrop-filter: blur(5px);
        }
        
        #trigger-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.1), transparent);
            transition: left 0.6s;
        }
        
        #trigger-btn:hover:not(:disabled) {
            background: rgba(255, 255, 255, 0.05);
            letter-spacing: 4px;
            transform: translateY(-2px);
        }
        
        #trigger-btn:hover:not(:disabled)::before {
            left: 100%;
        }
        
        #trigger-btn:active:not(:disabled) {
            transform: translateY(0);
        }
        
        #trigger-btn:disabled {
            border-color: var(--text-muted);
            color: var(--text-muted);
            cursor: not-allowed;
            opacity: 0.6;
            transform: none;
        }
        
        .results-area {
            margin-top: 35px;
            text-align: left;
            animation: slideIn 0.8s ease-out 1s both;
            border-top: 1px solid var(--border-color);
            padding-top: 20px;
        }
        
        #system-log-live {
            font-family: var(--font-mono);
            font-size: 0.9rem;
            min-height: 150px;
            max-height: 300px;
            overflow-y: auto;
            border-radius: 0;
            padding: 20px;
            background: rgba(0, 0, 0, 0.7);
            border: 1px solid var(--border-color);
            white-space: pre-wrap;
            word-wrap: break-word;
            backdrop-filter: blur(5px);
        }
        
        #system-log-live .log-entry {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 8px 0;
            border-bottom: 1px solid rgba(51, 51, 51, 0.5);
            animation: slideIn 0.3s ease-out;
        }
        
        #system-log-live::-webkit-scrollbar {
            width: 8px;
        }
        
        #system-log-live::-webkit-scrollbar-track {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 0;
        }
        
        #system-log-live::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.2);
            border-radius: 0;
        }
        
        .result-summary {
            margin-top: 25px;
            display: flex;
            justify-content: space-around;
            text-align: center;
            font-family: var(--font-mono);
            padding: 20px;
            background: rgba(0, 0, 0, 0.7);
            border: 1px solid var(--border-color);
            border-radius: 0;
            animation: slideIn 0.5s ease-out;
            backdrop-filter: blur(5px);
        }
        
        .summary-item {
            padding: 10px;
            border-radius: 0;
            transition: all 0.3s ease;
            flex: 1;
            margin: 0 10px;
            border: 1px solid var(--border-color);
        }
        
        .summary-item:hover {
            transform: translateY(-5px);
            border-color: var(--primary-accent);
            background: rgba(255, 255, 255, 0.05);
        }
        
        .summary-item strong {
            display: block;
            font-size: 1.8rem;
            margin-bottom: 5px;
            color: var(--primary-accent);
        }
        
        .summary-item .success {
            color: var(--success-color);
        }
        
        .summary-item .failure {
            color: var(--danger-color);
        }
        
        .site-footer {
            margin-top: 50px;
            text-align: center;
            color: var(--text-muted);
            font-size: 0.9rem;
            animation: slideIn 0.8s ease-out 1.2s both;
            padding: 20px;
            border-top: 1px solid var(--border-color);
            width: 100%;
            max-width: 850px;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(10px);
        }
        
        .site-footer p {
            margin-bottom: 10px;
            opacity: 0.8;
            letter-spacing: 1px;
        }
        
        .site-footer a {
            color: var(--primary-accent);
            text-decoration: none;
            font-weight: 500;
            position: relative;
            transition: all 0.3s ease;
            letter-spacing: 1px;
        }
        
        .site-footer a::after {
            content: '';
            position: absolute;
            bottom: -2px;
            left: 0;
            width: 0;
            height: 1px;
            background: var(--primary-accent);
            transition: width 0.3s ease;
        }
        
        .site-footer a:hover {
            letter-spacing: 2px;
        }
        
        .site-footer a:hover::after {
            width: 100%;
        }
        
        .pulse-dot {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--success-color);
            margin-right: 8px;
            animation: pulse 1.5s infinite;
        }
        
        .fade-in {
            animation: slideIn 0.5s ease-out;
        }
        
        /* Smooth transitions for all interactive elements */
        button, input, label {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        /* Focus styles for accessibility */
        *:focus {
            outline: 2px solid var(--primary-accent);
            outline-offset: 2px;
        }
        
        /* Loading animation */
        @keyframes loading {
            0% { width: 0%; }
            50% { width: 70%; }
            100% { width: 100%; }
        }
        
        .loading-bar {
            width: 100%;
            height: 2px;
            background: rgba(255, 255, 255, 0.1);
            margin-top: 10px;
            overflow: hidden;
        }
        
        .loading-fill {
            height: 100%;
            background: var(--primary-accent);
            width: 0%;
            animation: loading 2s ease-in-out infinite;
        }
    </style>
</head>
